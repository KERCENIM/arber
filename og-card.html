<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(900px 520px at 50% 38%, rgba(204,27,27,0.10), transparent 62%),
      #0b0d15;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e8e2d6;
  }
  .eagle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    width: 460px; height: 460px;
    opacity: 0.05;
    fill: #cc1b1b;
  }
  .pill {
    border: 1px solid rgba(196,151,60,0.55);
    color: #c4973c;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 14px 30px;
    margin-bottom: 46px;
    position: relative;
    z-index: 2;
  }
  .wordmark {
    font-family: 'EB Garamond', serif;
    font-size: 168px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.01em;
    position: relative;
    z-index: 2;
  }
  .wordmark .ikon { color: #cc1b1b; font-style: italic; }
  .tagline {
    margin-top: 40px;
    max-width: 760px;
    text-align: center;
    font-size: 27px;
    line-height: 1.5;
    color: #8a8278;
    font-weight: 300;
    position: relative;
    z-index: 2;
  }
</style>
</head>
